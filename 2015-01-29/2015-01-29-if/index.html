            Swift by Example - if 语句
        </div>
        <div class="post-meta">
            2015-01-29 ｜
            
        </div>
        <div class="post-md">
            <p><code>if</code> 语是Swift的条件语句之一，根据特定的条件执行特定的代码。</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">let num = 19</span><br><span class="line"></span><br><span class="line">// 1 </span><br><span class="line"></span><br><span class="line">if num == 19 &#123;</span><br><span class="line">    println(&quot;值为19&quot;)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">// 2</span><br><span class="line">if num &gt;= 20 &#123;</span><br><span class="line">    println(&quot;大于等于20&quot;)</span><br><span class="line">&#125; else &#123;</span><br><span class="line">    println(&quot;小于20&quot;)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">// 3</span><br><span class="line">if num &gt;= 20 &#123;</span><br><span class="line">    println(&quot;大于等于20&quot;)</span><br><span class="line">&#125; else if num &lt;= 10 &#123;</span><br><span class="line">    println(&quot;小于等于10&quot;)</span><br><span class="line">&#125; else &#123;</span><br><span class="line">    println(&quot;在10～20之间&quot;)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p><code>1</code>，只含一个条件，当且仅当该条件为 <code>true</code> 时，才会执行相应代码。</p>
<p><code>2</code>，两个条件，当条件为 <code>false</code> 时执行 <code>else</code> 语句。</p>
<p><code>3</code>, 多个 <code>if</code>组合起来。</p>
<p>输出：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">$ swift if.swift</span><br><span class="line">值为19</span><br><span class="line">小于20</span><br><span class="line">在10～20之间</span><br></pre></td></tr></table></figure>
