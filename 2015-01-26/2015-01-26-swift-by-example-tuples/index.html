            <p>Swift的元组（Tuple）是将多个值组合成一个复合值，便于计算和管理。元组内的值可以为任意类型，各字段值的类型不必相相同。</p>
<p>定义元组时，可以直接将值放到一起组成一个元组，也可以使用“K: V”的方式将键与值对应起来。在访问元组内元素时，可以使用序号进行访问，如果指定了键，则可以使用键名进行访问。</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">let info = (1000, &quot;张三&quot;, 99)</span><br><span class="line">println(&quot;No.: \(info.0), Name: \(info.1), Score: \(info.2)&quot;)</span><br><span class="line"></span><br><span class="line">let worker = (id: 001, name: &quot;hengheng&quot;)</span><br><span class="line">println(&quot;ID: \(worker.id), Name: \(worker.name)&quot;)</span><br></pre></td></tr></table></figure>

<p>输出：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">$ swift tuples.swift</span><br><span class="line">No.: 1000, Name: 张三, Score: 99</span><br><span class="line">ID: 1, Name: hengheng</span><br></pre></td></tr></table></figure>
