<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0fdf4;
            color: #1f2937;
            line-height: 1.7;
            padding: 60px 24px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #065f46;
        }
        .subtitle {
            font-size: 16px;
            color: #059669;
            margin-bottom: 40px;
            font-weight: 500;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 28px 0 14px;
            color: #047857;
        }
        p {
            color: #374151;
            margin-bottom: 14px;
        }
        ul {
            margin: 14px 0;
            padding-left: 18px;
            color: #4b5563;
        }
        li { margin-bottom: 8px; }
        code {
            background: #d1fae5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SF Mono", monospace;
            font-size: 13px;
            color: #065f46;
        }
        pre {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 16px 0;
        }
        pre code {
            background: none;
            padding: 0;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin: 20px 0;
            border: 1px solid #d1fae5;
        }
        .tag {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="tag">Template 03</span>
        <h1>Mint Fresh</h1>
        <p class="subtitle">清新薄荷风格</p>

        <div class="card">
            <h2>特性</h2>
            <ul>
                <li>薄荷绿清新配色</li>
                <li>白色卡片设计</li>
                <li>绿色点缀</li>
                <li>现代感</li>
            </ul>
        </div>

        <h2>代码展示</h2>
        <pre><code>const theme = {
    primary: "#10b981",
    background: "#f0fdf4"
};</code></pre>

        <p>适合科技、工具类文档。</p>
    </div>
</body>
</html>
