<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf5ff;
            color: #2e1065;
            line-height: 1.8;
            padding: 60px 24px;
        }
        .container {
            max-width: 660px;
            margin: 0 auto;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 17px;
            color: #7c3aed;
            margin-bottom: 44px;
            font-weight: 500;
        }
        h2 {
            font-size: 19px;
            font-weight: 600;
            margin: 30px 0 16px;
            color: #5b21b6;
        }
        p {
            color: #4c1d95;
            margin-bottom: 16px;
        }
        ul {
            margin: 14px 0;
            padding-left: 20px;
            color: #6b21a8;
        }
        li { margin-bottom: 8px; }
        code {
            background: #ede9fe;
            padding: 2px 7px;
            border-radius: 4px;
            font-family: "SF Mono", monospace;
            font-size: 13px;
            color: #6d28d9;
        }
        pre {
            background: #f5f3ff;
            border-left: 4px solid #8b5cf6;
            border-radius: 0 8px 8px 0;
            padding: 18px 22px;
            margin: 18px 0;
        }
        pre code {
            background: none;
            padding: 0;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            margin: 24px 0;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.08);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lavender Dream</h1>
        <p class="subtitle">梦幻薰衣草风格</p>

        <div class="card">
            <h2>特点</h2>
            <ul>
                <li>紫色渐变标题</li>
                <li>淡紫背景</li>
                <li>柔和阴影卡片</li>
                <li>浪漫优雅</li>
            </ul>
        </div>

        <h2>代码示例</h2>
        <pre><code>const colors = {
    primary: "#8b5cf6",
    light: "#faf5ff"
};</code></pre>

        <p>适合创意、设计类内容。</p>
    </div>
</body>
</html>
