<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff1f2;
            color: #881337;
            line-height: 1.8;
            padding: 60px 24px;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #be123c;
        }
        .subtitle {
            font-size: 17px;
            color: #e11d48;
            margin-bottom: 44px;
        }
        h2 {
            font-size: 19px;
            font-weight: 600;
            margin: 30px 0 14px;
            color: #9f1239;
        }
        p {
            color: #a21caf;
            margin-bottom: 14px;
        }
        ul {
            margin: 14px 0;
            padding-left: 20px;
            color: #be185d;
        }
        li { margin-bottom: 8px; }
        code {
            background: #fce7f3;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SF Mono", monospace;
            font-size: 13px;
            color: #db2777;
        }
        pre {
            background: white;
            border-radius: 12px;
            padding: 20px 24px;
            margin: 18px 0;
            box-shadow: 0 2px 12px rgba(219, 39, 119, 0.08);
        }
        pre code {
            background: none;
            padding: 0;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            margin: 24px 0;
            border: 1px solid #fce7f3;
        }
        .icon {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #f472b6, #ec4899);
            border-radius: 10px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rose Garden</h1>
        <p class="subtitle">玫瑰粉优雅风格</p>

        <div class="card">
            <div class="icon"></div>
            <h2>特点</h2>
            <ul>
                <li>玫瑰粉色系</li>
                <li>渐变图标</li>
                <li>柔美卡片</li>
                <li>女性化优雅</li>
            </ul>
        </div>

        <h2>代码</h2>
        <pre><code>const rose = {
    primary: "#ec4899",
    light: "#fff1f2"
};</code></pre>

        <p>适合时尚、生活美学类内容。</p>
    </div>
</body>
</html>
