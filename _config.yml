# Site
title: WanQing's Blog
subtitle: 人生不过弹指之间，惟有慢下来才能感受生命的美好。
description: 记录编程，学习，写作，阅读。
author: wanqing
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://wwq0327.github.io
root: /
permalink: :year-:month-:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: post
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocessor: ""
  line_number: false
  tab_replace: ""

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page
# Set to false to disable
# For Hexo < 7, use `archive: 1` etc.
generator: pagination

# Index Generator
index_generator:
  order_by: -date
  per_page: 10
  path: ''

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: fluid

# Deployment
deploy:
  type: git
  repo: git@github.com:wwq0327/wwq0327.github.com.git
  branch: master
  message: "Site updated: {{now('YYYY-MM-DD HH:mm:ss')}}"

# Feed
feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  content_limit_delim: " "
  order_by: -date
  autodiscovery: true
  template:
