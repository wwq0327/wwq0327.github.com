<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            line-height: 1.7;
            padding: 60px 24px;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }
        .subtitle {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 36px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 28px 0 12px;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        p {
            color: #475569;
            margin-bottom: 14px;
        }
        ul {
            margin: 12px 0;
            padding-left: 16px;
            color: #64748b;
        }
        li { margin-bottom: 6px; }
        code {
            background: #e2e8f0;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: "SF Mono", monospace;
            font-size: 12px;
            color: #334155;
        }
        pre {
            background: #1e293b;
            border-radius: 8px;
            padding: 18px 22px;
            margin: 16px 0;
            overflow-x: auto;
        }
        pre code {
            background: none;
            padding: 0;
            color: #e2e8f0;
        }
        .card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin: 18px 0;
        }
        .label {
            display: inline-block;
            background: #64748b;
            color: white;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Slate Professional</h1>
        <p class="subtitle">专业石板灰风格</p>

        <div class="card">
            <span class="label">Template 07</span>
            <h2>特点</h2>
            <ul>
                <li>专业灰蓝色调</li>
                <li>Inter 字体</li>
                <li>简洁线条</li>
                <li>高效清晰</li>
            </ul>
        </div>

        <h2>代码</h2>
        <pre><code>const slate = {
    text: "#0f172a",
    muted: "#64748b"
};</code></pre>

        <p>适合商务、效率工具类内容。</p>
    </div>
</body>
</html>
