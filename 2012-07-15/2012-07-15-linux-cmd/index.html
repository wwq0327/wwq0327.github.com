            <p>记录一些常用的或是奇怪的Linux命令行，一性难以记完，遇到一条就加上一条。</p>
<ul>
<li>命令行下新建一个文件交输入内容：</li>
</ul>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">$ <span class="built_in">cat</span> &gt; new_file.txt</span><br><span class="line">这里是内容</span><br></pre></td></tr></table></figure>

<p>完成之后，需键入<code>ctrl+d</code>来保存并退出编辑状态。</p>
<ul>
<li>显示目录结构：</li>
</ul>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ tree -L 2 dir_name</span><br></pre></td></tr></table></figure>

<p>会生成类似于下面结构的内容：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">/opt</span><br><span class="line">`-- google</span><br><span class="line">    |-- chrome</span><br><span class="line">    `-- talkplugin</span><br></pre></td></tr></table></figure>
