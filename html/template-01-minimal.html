<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fafafa;
            color: #1a1a1b;
            line-height: 1.8;
            padding: 60px 24px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 18px;
            color: #6e6e73;
            margin-bottom: 40px;
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 32px 0 16px;
        }
        p {
            color: #4a4a4a;
            margin-bottom: 16px;
        }
        ul {
            margin: 16px 0;
            padding-left: 20px;
            color: #4a4a4a;
        }
        li { margin-bottom: 8px; }
        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SF Mono", monospace;
            font-size: 14px;
        }
        pre {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 16px 0;
            overflow-x: auto;
        }
        pre code {
            background: none;
            padding: 0;
        }
        .card {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 24px;
            margin: 24px 0;
        }
        .badge {
            display: inline-block;
            background: #007AFF;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Template 01</span>
        <h1>Minimal Light</h1>
        <p class="subtitle">极简风格 - 干净利落</p>

        <div class="card">
            <h2>特性</h2>
            <ul>
                <li>纯净白色背景</li>
                <li>系统字体</li>
                <li>蓝灰色调</li>
                <li>简洁卡片</li>
            </ul>
        </div>

        <h2>代码示例</h2>
        <pre><code>const greeting = "Hello World";
console.log(greeting);</code></pre>

        <p>这是一段示例文字，用于展示模板的基本样式效果。</p>
    </div>
</body>
</html>
