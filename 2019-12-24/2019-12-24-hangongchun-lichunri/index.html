            <p>春已归来，看美人头上，袅袅春幡。无端风雨，未肯收尽馀寒。年时燕子，料今宵梦到西园。浑未办黄柑荐酒，更传青韭堆盘。</p>
<p>却笑东风从此，便熏梅染柳，更没些闲。闲时又来镜里，转变朱颜。清愁不断，问何人会解连环。生怕见花开花落，朝来塞雁先还。</p>
