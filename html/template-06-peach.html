<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fffbf5;
            color: #431407;
            line-height: 1.8;
            padding: 60px 24px;
        }
        .container {
            max-width: 660px;
            margin: 0 auto;
        }
        h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #9a3412;
        }
        .subtitle {
            font-size: 16px;
            color: #c2410c;
            margin-bottom: 40px;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 28px 0 14px;
            color: #b45309;
        }
        p {
            color: #7c2d12;
            margin-bottom: 14px;
        }
        ul {
            margin: 14px 0;
            padding-left: 18px;
            color: #9a3412;
        }
        li { margin-bottom: 8px; }
        code {
            background: #ffedd5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SF Mono", monospace;
            font-size: 13px;
            color: #ea580c;
        }
        pre {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 8px;
            padding: 18px 22px;
            margin: 18px 0;
        }
        pre code {
            background: none;
            padding: 0;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin: 22px 0;
            border-left: 4px solid #f97316;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #f97316;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Peach Glow</h1>
        <p class="subtitle">蜜桃橙暖风格</p>

        <div class="card">
            <h2><span class="dot"></span>特点</h2>
            <ul>
                <li>温暖蜜桃色调</li>
                <li>橙红色点缀</li>
                <li>左侧强调线</li>
                <li>温馨亲切</li>
            </ul>
        </div>

        <h2>代码示例</h2>
        <pre><code>const warm = {
    primary: "#f97316",
    background: "#fffbf5"
};</code></pre>

        <p>适合美食、生活、情感类内容。</p>
    </div>
</body>
</html>
