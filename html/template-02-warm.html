<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, "Times New Roman", serif;
            background: #fef9f3;
            color: #3d3d3d;
            line-height: 1.9;
            padding: 60px 24px;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        h1 {
            font-size: 34px;
            font-weight: 400;
            margin-bottom: 20px;
            color: #2d2d2d;
        }
        .subtitle {
            font-size: 17px;
            color: #8b7355;
            margin-bottom: 48px;
            font-style: italic;
        }
        h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 36px 0 18px;
            color: #5c4a32;
        }
        p {
            color: #555;
            margin-bottom: 18px;
        }
        ul {
            margin: 16px 0;
            padding-left: 22px;
            color: #666;
        }
        li { margin-bottom: 10px; }
        code {
            background: #f5ebe0;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: "SF Mono", monospace;
            font-size: 14px;
            color: #8b4513;
        }
        pre {
            background: #f5ebe0;
            border-radius: 8px;
            padding: 20px 24px;
            margin: 20px 0;
        }
        pre code {
            background: none;
            padding: 0;
            color: #8b4513;
        }
        .divider {
            border: none;
            border-top: 1px solid #e8dcc8;
            margin: 40px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Warm Paper</h1>
        <p class="subtitle">温暖纸张风格</p>

        <hr class="divider">

        <h2>特点</h2>
        <p>暖色调背景配合衬线字体，营造书卷气息。</p>
        <ul>
            <li>米黄色温暖背景</li>
            <li>Georgia 衬线字体</li>
            <li>棕色系点缀</li>
        </ul>

        <hr class="divider">

        <h2>代码</h2>
        <pre><code>function greet(name) {
    return `Hello, ${name}!`;
}</code></pre>

        <p>适合文档、笔记、文章类内容。</p>
    </div>
</body>
</html>
