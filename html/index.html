<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 文档库 - WanQing's Blog</title>
    <meta name="description" content="已上传的 HTML 文档索引">
    <link rel="canonical" href="https://wwq0327.github.io/html/">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/markdown.css">
    <link rel="stylesheet" href="/css/fonts.css">
</head>
<body>
    <div class="paper">
        <div class="paper-main">
            <header class="post-header">
                <a href="/" class="go-home">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    返回首页
                </a>
                <div class="post-main-title">HTML 文档库</div>
                <div class="post-meta">共 1 个文档</div>
            </header>

            <div class="html-docs-list">
                <table class="docs-table">
                    <thead>
                        <tr>
                            <th>文件名</th>
                            <th>描述</th>
                            <th>上传时间</th>
                            <th>大小</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <a href="/html/claude-code-best-practices.html" class="doc-link">
                                    claude-code-best-practices.html
                                </a>
                            </td>
                            <td class="doc-desc">Claude Code 最佳实践指南</td>
                            <td class="doc-date">2026-05-10</td>
                            <td class="doc-size">15987 B</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <footer class="footer">
                <span>由 <a href="https://hexo.io">Hexo</a> 驱动 | 主题 <a href="https://github.com/wwq0327/hexo-theme-zenmind">zenmind</a></span>
            </footer>
        </div>
    </div>

    <style>
        .html-docs-list {
            margin-bottom: 48px;
        }
        .docs-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .docs-table th,
        .docs-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px dashed var(--line-2);
        }
        .docs-table th {
            font-weight: 600;
            color: var(--font-color-1);
            background: #fafafa;
        }
        .docs-table tr:hover {
            background: #fafafa;
        }
        .doc-link {
            color: var(--font-color-1);
            font-weight: 500;
        }
        .doc-link:hover {
            color: var(--font-color-0);
        }
        .doc-desc {
            color: var(--font-color-2);
        }
        .doc-date,
        .doc-size {
            color: var(--font-color-3);
            white-space: nowrap;
        }
        @media (max-width: 600px) {
            .docs-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</body>
</html>
