<p>除了安装上<code>mysql-server</code>之外，还需要安装:</p>
<ul>
<li>ubuntu</li>
</ul>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo apt-get install libmysqld-dev</span><br></pre></td></tr></table></figure>

<ul>
<li>fedora</li>
</ul>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">sudo yum install mysql-devel</span><br><span class="line">sudo yum install python-devel</span><br></pre></td></tr></table></figure>

<p>然后问题搞定。</p>
