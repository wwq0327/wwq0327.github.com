<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Times New Roman", Georgia, serif;
            background: #f5f5f0;
            color: #2d2a24;
            line-height: 1.9;
            padding: 60px 24px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 36px;
            font-weight: 400;
            margin-bottom: 16px;
            color: #1a1915;
            border-bottom: 2px solid #3d3a32;
            padding-bottom: 16px;
        }
        .subtitle {
            font-size: 16px;
            color: #6b6656;
            margin-bottom: 48px;
            font-style: italic;
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 36px 0 18px;
            color: #3d3a32;
        }
        p {
            color: #4a4840;
            margin-bottom: 18px;
            text-align: justify;
        }
        ul {
            margin: 16px 0;
            padding-left: 22px;
            color: #5c584a;
        }
        li { margin-bottom: 10px; }
        code {
            background: #e8e6de;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: "SF Mono", monospace;
            font-size: 13px;
            color: #4a4840;
        }
        pre {
            background: #e8e6de;
            border-radius: 6px;
            padding: 18px 22px;
            margin: 18px 0;
        }
        pre code {
            background: none;
            padding: 0;
        }
        .card {
            background: #ebe9e2;
            border-radius: 4px;
            padding: 24px;
            margin: 24px 0;
        }
        blockquote {
            border-left: 3px solid #8b8680;
            padding-left: 20px;
            margin: 24px 0;
            font-style: italic;
            color: #6b6656;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Earth Tone</h1>
        <p class="subtitle">大地色复古风格</p>

        <div class="card">
            <h2>特点</h2>
            <ul>
                <li>米灰色复古背景</li>
                <li>衬线字体</li>
                <li>大地色系</li>
                <li>经典书籍感</li>
            </ul>
        </div>

        <blockquote>简洁是终极的复杂。</blockquote>

        <h2>代码</h2>
        <pre><code>const earth = {
    bg: "#f5f5f0",
    accent: "#6b6656"
};</code></pre>

        <p>适合文学、哲学、随笔类内容。</p>
    </div>
</body>
</html>
