            <p>常量的声明与变量类似，只是使用了<code>let</code>这个关键词。常最声明后，其值不能被修改，如果尝试修改，便会报错。</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">let pi: Float = 3.14</span><br><span class="line">let lang = &quot;Swift&quot;</span><br><span class="line"></span><br><span class="line">println(&quot;PI: \(pi), Language: \(lang)&quot;)</span><br></pre></td></tr></table></figure>

<p>输出：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">$ swift constants.swift</span><br><span class="line">PI: 3.14, Language: Swift</span><br></pre></td></tr></table></figure>
